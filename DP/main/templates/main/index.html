<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <!-- Този meta таг е критично важен за мобилни устройства, за да мащабира правилно екрана -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerPoint Контролер</title>

    <!-- Bootstrap 5 CDN за бърз и красив мобилен дизайн -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Допълнителни стилове за по-големи бутони, удобни за телефон */
        body { background-color: #2c3e50; color: white; }
        .btn-huge { height: 80px; font-size: 1.5rem; border-radius: 15px; }
        .btn-circle { width: 80px; height: 80px; border-radius: 50%; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; margin: 0 auto;}
        .app-title { font-weight: bold; margin-bottom: 30px; color: #ecf0f1; }
    </style>
</head>
<body>

    <!-- Тук започва Vue.js приложението -->
    <div id="app" class="container mt-4 text-center">
        <h2 class="app-title">📱 PPT Контролер</h2>

        <!-- Статус съобщение -->
        <div style="height: 30px; margin-bottom: 20px;">
            <span :class="statusClass">{{ statusMessage }}</span>
        </div>

        <div class="row g-3">
            <!-- Бутон за старт на презентацията -->
            <div class="col-12">
                <button @click="sendCommand('start')" class="btn btn-success w-100 btn-huge">
                    ▶️ Старт (F5)
                </button>
            </div>

            <!-- Бутони за навигация -->
            <div class="col-6">
                <button @click="sendCommand('prev')" class="btn btn-primary w-100 btn-huge">
                    ⬅️ Назад
                </button>
            </div>
            <div class="col-6">
                <button @click="sendCommand('next')" class="btn btn-primary w-100 btn-huge">
                    Напред ➡️
                </button>
            </div>

            <!-- Допълнителни контроли -->
            <div class="col-6 mt-4">
                <button @click="sendCommand('black')" class="btn btn-dark btn-circle border border-secondary">
                    Черен<br>Екран
                </button>
            </div>
            <div class="col-6 mt-4">
                <button @click="sendCommand('white')" class="btn btn-light btn-circle border border-secondary text-dark">
                    Бял<br>Екран
                </button>
            </div>

            <!-- Бутон за изход -->
            <div class="col-12 mt-4">
                <button @click="sendCommand('esc')" class="btn btn-danger w-100 btn-huge" style="height: 60px; font-size: 1.2rem;">
                    ⏹️ Край (Esc)
                </button>
            </div>
        </div>
    </div>

    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    statusMessage: 'Готов за команди',
                    statusClass: 'text-info'
                }
            },
            methods: {
                // Функция за взимане на CSRF токена от бисквитките (задължително за Django POST заявки)
                getCookie(name) {
                    let cookieValue = null;
                    if (document.cookie && document.cookie !== '') {
                        const cookies = document.cookie.split(';');
                        for (let i = 0; i < cookies.length; i++) {
                            const cookie = cookies[i].trim();
                            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                                break;
                            }
                        }
                    }
                    return cookieValue;
                },

                // Основната функция, която праща заявката към сървъра
                sendCommand(action) {
                    const csrftoken = this.getCookie('csrftoken');

                    // Показваме, че зареждаме
                    this.statusMessage = `Изпращане на '${action}'...`;
                    this.statusClass = 'text-warning';

                    // Axios POST заявка към нашия API endpoint
                    axios.post('/api/command/', { action: action }, {
                        headers: {
                            'X-CSRFToken': csrftoken, // Изпращаме токена за сигурност
                            'Content-Type': 'application/json'
                        }
                    })
                    .then(response => {
                        // При успех
                        this.statusMessage = `✅ Успешно: ${action}`;
                        this.statusClass = 'text-success';

                        // Изчистваме съобщението след 2 секунди
                        setTimeout(() => {
                            this.statusMessage = 'Готов за команди';
                            this.statusClass = 'text-info';
                        }, 2000);
                    })
                    .catch(error => {
                        // При грешка
                        this.statusMessage = '❌ Грешка при връзката!';
                        this.statusClass = 'text-danger';
                        console.error(error);
                    });
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
